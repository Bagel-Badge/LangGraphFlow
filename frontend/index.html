<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangGraph React Flow UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://esm.sh/reactflow@11.10.1/dist/style.css" />
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "reactflow": "https://esm.sh/reactflow@11.10.1?deps=react@18.2.0,react-dom@18.2.0"
      }
    }
  </script>
</head>
<body class="bg-gray-50 h-screen w-screen m-0 p-0 overflow-hidden font-sans">
  <div id="root" class="w-full h-full"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import ReactFlow, { Background, Controls, applyNodeChanges, applyEdgeChanges, MarkerType } from 'reactflow';

    const INITIAL_NODES = [
      { id: '__start__', data: { label: 'START' }, position: { x: 300, y: 50 }, type: 'input' },
      { id: 'type_classifier', data: { label: 'Type Classifier' }, position: { x: 300, y: 150 } },
      { id: 'code_generator', data: { label: 'Code Generator' }, position: { x: 150, y: 250 } },
      { id: 'trap_classifier', data: { label: 'Trap Classifier' }, position: { x: 450, y: 250 } },
      { id: 'parallel_sync', data: { label: 'Parallel Sync' }, position: { x: 300, y: 350 } },
      { id: 'code_executor', data: { label: 'Code Executor' }, position: { x: 300, y: 450 } },
      { id: 'judge', data: { label: 'Judge' }, position: { x: 300, y: 550 } },
      { id: 'human_review', data: { label: 'Human Review (HITL)' }, position: { x: 450, y: 650 } },
      { id: '__end__', data: { label: 'END' }, position: { x: 300, y: 750 }, type: 'output' }
    ];

    const INITIAL_EDGES = [
      { id: 'e-start-type', source: '__start__', target: 'type_classifier', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-type-code', source: 'type_classifier', target: 'code_generator', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-type-trap', source: 'type_classifier', target: 'trap_classifier', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-code-sync', source: 'code_generator', target: 'parallel_sync', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-trap-sync', source: 'trap_classifier', target: 'parallel_sync', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-sync-exec', source: 'parallel_sync', target: 'code_executor', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-exec-judge', source: 'code_executor', target: 'judge', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-judge-human', source: 'judge', target: 'human_review', label: 'confidence < 75', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-judge-end', source: 'judge', target: '__end__', label: 'pass/trap', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-human-end', source: 'human_review', target: '__end__', markerEnd: { type: MarkerType.ArrowClosed } }
    ];

    function getColorForStatus(status) {
      if (status === 'executing') return '#ffa500'; // Orange
      if (status === 'success') return '#4ade80'; // Green
      if (status === 'blocked') return '#f87171'; // Red
      return '#ffffff'; // White default
    }

    function App() {
      const [nodes, setNodes] = useState(INITIAL_NODES);
      const [edges, setEdges] = useState(INITIAL_EDGES);
      
      const [threadId, setThreadId] = useState(null);
      const [selectedNode, setSelectedNode] = useState(null);
      const [nodeData, setNodeData] = useState({});
      
      const [question, setQuestion] = useState("已知 a+b=3，a-b=1，求 a*b。");
      const [truth, setTruth] = useState("2");
      const [statusPoller, setStatusPoller] = useState(null);
      
      const onNodesChange = useCallback(
        (changes) => setNodes((nds) => applyNodeChanges(changes, nds)),
        []
      );
      const onEdgesChange = useCallback(
        (changes) => setEdges((eds) => applyEdgeChanges(changes, eds)),
        []
      );

      const runGraph = async () => {
        try {
          const res = await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, truth })
          });
          const data = await res.json();
          setThreadId(data.thread_id);
          setNodeData({});
          
          // Reset nodes
          setNodes((nds) => nds.map(n => ({ ...n, style: { backgroundColor: '#ffffff' } })));
        } catch (e) {
          alert('Error starting graph');
        }
      };

      const resumeGraph = async (decision) => {
        try {
          await fetch(`/api/resume/${threadId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ decision })
          });
          // Close panel if open
          setSelectedNode(null);
        } catch (e) {
          alert('Error resuming graph');
        }
      };

      // Poll status
      useEffect(() => {
        if (!threadId) return;
        const interval = setInterval(async () => {
          const res = await fetch(`/api/status/${threadId}`);
          if (res.ok) {
            const data = await res.json();
            
            // Update Nodes with colors
            setNodes((nds) => nds.map(n => {
              const nodeInfo = data.nodes[n.id];
              let color = '#ffffff';
              if (nodeInfo) {
                 color = getColorForStatus(nodeInfo.status);
              }
              return { ...n, style: { backgroundColor: color } };
            }));

            // Sync data
            setNodeData(data.nodes || {});
            
            if (data.status === 'finished' || data.status === 'error') {
              clearInterval(interval);
            }
          }
        }, 1000);
        return () => clearInterval(interval);
      }, [threadId]);

      const onNodeClick = (_, node) => {
        setSelectedNode(node.id);
      };

      return (
        <div className="flex h-screen overflow-hidden">
          <div className="flex-1 relative">
             <ReactFlow
              nodes={nodes}
              edges={edges}
              onNodesChange={onNodesChange}
              onEdgesChange={onEdgesChange}
              onNodeClick={onNodeClick}
              fitView
              attributionPosition="bottom-right"
            >
              <Background />
              <Controls />
            </ReactFlow>
          </div>
          
          {selectedNode && (
            <div className="w-1/3 bg-white border-l h-full overflow-y-auto p-4 flex flex-col shadow-lg z-50">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-xl font-bold">Node: {selectedNode}</h2>
                <button onClick={() => setSelectedNode(null)} className="text-red-500 font-bold">X</button>
              </div>
              
              {selectedNode === '__start__' && (
                <div className="mb-4 space-y-3">
                  <p><strong>Input Question & Truth</strong></p>
                  <textarea 
                    value={question} 
                    onChange={e => setQuestion(e.target.value)}
                    className="w-full border p-2 text-sm"
                    rows="4"
                    placeholder="Enter mathematical question..."
                  />
                  <input 
                    value={truth} 
                    onChange={e => setTruth(e.target.value)}
                    className="w-full border p-2 text-sm" 
                    placeholder="Ground Truth"
                  />
                  <button 
                    onClick={runGraph} 
                    className="bg-blue-600 text-white rounded px-4 py-2 w-full hover:bg-blue-700"
                  >
                    Run Graph
                  </button>
                </div>
              )}
              
              {selectedNode === 'human_review' && nodeData['human_review']?.status === 'blocked' && (
                <div className="mb-4 bg-red-50 p-3 border border-red-200">
                  <p className="font-bold text-red-600 mb-2">Needs Human Review!</p>
                  <p className="text-sm text-gray-700 mb-3">Model execution finished but confidence or output needs review.</p>
                  <button onClick={() => resumeGraph('Manual_Confirmed_Match')} className="bg-green-600 text-white px-3 py-1 mr-2 rounded hover:bg-green-700">Approve (Match)</button>
                  <button onClick={() => resumeGraph('Manual_Overruled_Mismatch')} className="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">Reject (Mismatch)</button>
                </div>
              )}
              
              <div className="mt-4 break-words">
                <h3 className="font-semibold border-b pb-1">LLM Response / Output Data</h3>
                {nodeData[selectedNode] && nodeData[selectedNode].data ? (
                  <pre className="bg-gray-100 p-2 text-xs overflow-x-auto mt-2 whitespace-pre-wrap">
                    {JSON.stringify(nodeData[selectedNode].data, null, 2)}
                  </pre>
                ) : (
                  <p className="text-gray-500 text-sm italic mt-2">No data yet.</p>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
